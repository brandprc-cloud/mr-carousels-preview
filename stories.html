<script>
const V='?v=20260624st2';
function fill(id,files){const r=document.getElementById(id);files.forEach(f=>{const p='stories/'+f+'.png'+V;const im=new Image();im.src=p;im.onclick=()=>{document.getElementById('li').src=p;document.getElementById('lb').classList.add('on')};r.appendChild(im);});}
