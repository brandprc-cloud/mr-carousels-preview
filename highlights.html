<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Обложки хайлайтов @mr.brezgin</title>
<style>
body{background:#05060a;color:#f4f5fb;font-family:-apple-system,Inter,sans-serif;margin:0;padding:22px 14px 60px}
h1{font-size:20px;font-weight:700;text-align:center;margin:6px 0 2px}
.sub{color:#8b90a6;font-size:13px;text-align:center;margin-bottom:24px;line-height:1.5}
h2{font-size:14px;color:#aeb4c4;text-align:center;font-weight:600;margin:26px 0 14px;letter-spacing:.04em}
/* как в профиле — кружком */
.circles{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;max-width:760px;margin:0 auto}
.hl{display:flex;flex-direction:column;align-items:center;gap:8px}
.hl .c{width:92px;height:92px;border-radius:50%;border:2px solid rgba(255,255,255,.18);background-size:cover;background-position:center}
.hl .cap{font-size:11px;color:#c7ccdb;max-width:96px;text-align:center}
/* полные квадраты */
.row{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;padding:4px 4px 14px;max-width:760px;margin:0 auto}
.row img{width:46%;max-width:240px;flex:none;scroll-snap-align:center;border-radius:16px;border:1px solid rgba(255,255,255,.08);cursor:pointer}
a{color:#5b82ff}.lk{display:block;text-align:center;margin-top:22px;font-size:13px}
#lb{position:fixed;inset:0;background:rgba(0,0,0,.94);display:none;align-items:center;justify-content:center;z-index:50;padding:14px}#lb.on{display:flex}#lb img{max-width:100%;max-height:100%}
</style></head><body>
<h1>Обложки хайлайтов — стиль В1</h1>
<div class="sub">5 обложек: графит + синий, тонкий лейбл, монолайн-иконка · 1080×1080<br>сверху — как будет в профиле (кружком), ниже — полные картинки (тапни)</div>

<h2>В профиле (круглая обрезка Instagram)</h2>
<div class="circles" id="circ"></div>

<h2>Полные обложки</h2>
<div class="row" id="r"></div>

<a class="lk" href="./antihype.html">← к карусели №2</a>
<div id="lb" onclick="this.classList.remove('on')"><img id="li"></div>
<script>
const items=[
  {f:'o-nem',t:'Обо мне'},{f:'keysy',t:'Кейсы'},{f:'otzyvy',t:'Отзывы'},
  {f:'ai-sistema',t:'AI-система'},{f:'diagnostika',t:'Диагностика'}
];
const V='?v=20260624h2';
const circ=document.getElementById('circ'), r=document.getElementById('r');
items.forEach(it=>{
  const p='highlights/'+it.f+'.png'+V;
  const w=document.createElement('div');w.className='hl';
  w.innerHTML=`<div class="c" style="background-image:url(${p})"></div><div class="cap">${it.t}</div>`;
  circ.appendChild(w);
  const im=new Image();im.src=p;im.onclick=()=>{document.getElementById('li').src=p;document.getElementById('lb').classList.add('on')};
  r.appendChild(im);
});
</script></body></html>
